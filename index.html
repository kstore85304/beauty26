<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미용사 합격 앱</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; font-size: 26px; }
        h2 { color: #444; font-size: 22px; margin-bottom: 20px; }
        .menu-list { list-style: none; padding: 0; }
        .menu-item { background: #fff; border: 2px solid #4CAF50; margin: 10px 0; padding: 20px; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.3s; }
        .menu-item:hover { background: #4CAF50; color: white; }
        .option { display: block; margin: 15px 0; font-size: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .wrong { background-color: #e0e0e0 !important; color: #888; cursor: not-allowed; }
        .correct { background-color: #d4edda !important; color: #155724; font-weight: bold; border: 2px solid #28a745; }
        #explanation { margin-top: 20px; padding: 15px; background-color: #e7f3fe; border-left: 6px solid #2196F3; display: none; font-size: 19px; }
        .btn { width: 100%; padding: 15px; font-size: 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-next { background-color: #2196F3; color: white; display: none; }
        .btn-home { background-color: #666; color: white; margin-top: 20px; }
        b { color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>기출문제 풀이</h1>
        <ul class="menu-list">
            <li class="menu-item" onclick="startQuiz(1)">기출문제 1회</li>
            <li class="menu-item" onclick="startQuiz(2)">기출문제 2회</li>
			<li class="menu-item" onclick="startQuiz(3)">기출문제 3회</li>
            <li class="menu-item" onclick="startQuiz(4)">기출문제 4회</li>
            <li class="menu-item" onclick="startQuiz(5)">기출문제 5회</li>
            <li class="menu-item" onclick="startQuiz(6)">기출문제 6회</li>
			<li class="menu-item" onclick="startQuiz(7)">기출문제 7회</li>
            <li class="menu-item" onclick="startQuiz(8)">기출문제 8회</li>

        </ul>
    </div>

    <div id="quiz-screen" style="display:none;">
        <h2 id="quiz-title"></h2>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="explanation"></div>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">다음 문제로</button>
        <button class="btn btn-home" onclick="goHome()">목록으로 돌아가기</button>
    </div>
</div>

<script src="./beauty_question_1-7.js"></script>
<script>
    //const allQuizzes = 기출문제 1-7회기	
	
    let currentSet = [];
    let currentIdx = 0;

    function startQuiz(num) {
        if(!allQuizzes[num]) {
            alert(num + "회차 문제는 준비 중입니다.");
            return;
        }
        currentSet = allQuizzes[num];
        currentIdx = 0;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('quiz-title').innerText = "기출문제 " + num + "회";
        loadQuestion();
    }

    function loadQuestion() {
        const data = currentSet[currentIdx];
        document.getElementById('question-text').innerHTML = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        data.a.forEach((txt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = txt;
            div.onclick = () => {
                if(i === data.c) {
                    div.className = 'option correct';
                    document.getElementById('explanation').innerHTML = "<strong>정답의 근거:</strong> " + data.e;
                    document.getElementById('explanation').style.display = 'block';
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    div.className = 'option wrong';
                }
            };
            container.appendChild(div);
        });
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentSet.length) loadQuestion();
        else { alert("40번까지 모두 풀었습니다!"); goHome(); }
    }

    function goHome() {
        document.getElementById('home-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
    }
</script>
</body>
</html>
